services:
  signer:
    build:
      context: .
      dockerfile: packages/signer/Dockerfile
    platform: linux/amd64
    ports:
      - '8080:8080'
    env_file:
      - path: .env
        required: false
    environment:
      - STORAGE_PROVIDER=LOCAL
      - INPUT_BUCKET=/host_stream
      - OUTPUT_BUCKET=/host_stream
      - MPD_KEY=output/stream.mpd
      - DEBUG=true
      - PUB_CERT=/app/certs/ps256.pub
      - PRIV_KEY=/app/certs/ps256.pem
      - USE_VSI_METHOD=false
      - SESSION_KEY_PATH=/app/certs/session.pem
      - CLEANUP_MAX_AGE_MINUTES=35
      - CLEANUP_INTERVAL_MS=60000
    volumes:
      - stream-data:/host_stream
      - ./packages/signer/certs:/app/certs:ro
      - ./packages/signer/segment_manifest.json:/app/segment_manifest.json:ro
      - ./packages/signer/segment_manifest_vsi.json:/app/segment_manifest_vsi.json:ro
    depends_on:
      - streamer

  origin-server:
    build:
      context: .
      dockerfile: packages/origin-server/Dockerfile
    ports:
      - '8082:8081'
    environment:
      - STATIC_FILES_PATH=/usr/src/app/live-streaming
    volumes:
      - stream-data:/usr/src/app/live-streaming
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8081/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  manifest-server:
    build:
      context: .
      dockerfile: packages/stream-source/Dockerfile.manifest-server
    ports:
      - '3000:3000'
    environment:
      - STREAM_ROOT=/app/live-streaming
    volumes:
      - stream-data:/app/live-streaming
    depends_on:
      - origin-server
    restart: unless-stopped

  streamer:
    image: jrottenberg/ffmpeg:6.0-ubuntu
    platform: linux/amd64
    entrypoint: []
    working_dir: /host_stream
    volumes:
      - stream-data:/host_stream
      - ./packages/stream-source/scripts:/host_stream/scripts:ro
      - ./packages/stream-source/input:/host_stream/input:ro
    command: ["sh", "./scripts/start-all.sh"]
    restart: unless-stopped

  attack-proxy:
    build:
      context: .
      dockerfile: packages/attack-proxy/Dockerfile
    ports:
      - '8083:8083'
    environment:
      - PORT=8083
      - STATIC_SERVER_URL=http://origin-server:8081
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      origin-server:
        condition: service_healthy

volumes:
  stream-data:

networks:
  default:
    driver: bridge
